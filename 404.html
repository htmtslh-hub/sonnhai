<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 — Không tìm thấy trang</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <link href="https://fonts.googleapis.com/css2?family=Exo+2:wght@700;900&family=Be+Vietnam+Pro:wght@400;600&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Be Vietnam Pro', sans-serif; background: #08090E; color: #DDE1EC; min-height: 100vh; display: flex; align-items: center; justify-content: center; text-align: center; padding: 40px; }
    .container { max-width: 480px; }
    .code { font-family: 'Exo 2', sans-serif; font-size: clamp(80px, 20vw, 140px); font-weight: 900; background: linear-gradient(120deg, #00D4D4, #00FFFF, #00B4D8); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; line-height: 1; margin-bottom: 16px; }
    .title { font-size: 20px; font-weight: 600; margin-bottom: 12px; }
    .desc { font-size: 14px; color: #8B93A8; line-height: 1.7; margin-bottom: 32px; }
    .btn { display: inline-flex; align-items: center; gap: 8px; background: #00D4D4; color: #08090E; font-size: 14px; font-weight: 700; padding: 13px 28px; border-radius: 9px; text-decoration: none; transition: all .25s; }
    .btn:hover { background: #00EEEE; box-shadow: 0 0 24px rgba(0,212,212,.4); transform: translateY(-2px); }
  </style>
</head>
<body>
  <div class="container">
    <div class="code">404</div>
    <div class="title">Trang không tồn tại</div>
    <p class="desc">Trang bạn đang tìm kiếm không tồn tại hoặc đã được di chuyển. Hãy quay lại trang chủ để tiếp tục khám phá.</p>
    <a href="/" class="btn">Về trang chủ</a>
  </div>
</body>
</html>
