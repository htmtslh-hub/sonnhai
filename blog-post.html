  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    :root {

      --border:#1C2232; --border-2:#252D3F;
      --teal:#00D4D4; --teal-dim:#00AEAE; --teal-dark:#005A5A;
      --teal-glow:rgba(0,212,212,.12); --teal-glow-strong:rgba(0,212,212,.25);

    }
    html { scroll-behavior: smooth; }
    body { font-family: 'Be Vietnam Pro', sans-serif; background: var(--bg); color: var(--text); overflow-x: hidden; min-height: 100vh; }

    .nav-links a:hover, .nav-links a.on { color: var(--text); background: rgba(255,255,255,.05); }
    .nav-right { display: flex; align-items: center; gap: 10px; }
    .nav-cart { position: relative; padding: 5px; cursor: pointer; text-decoration: none; color: inherit; }
    .cart-dot { position: absolute; top: 2px; right: 2px; width: 15px; height: 15px; border-radius: 50%; background: var(--teal); font-size: 9px; font-weight: 700; color: var(--bg); display: flex; align-items: center; justify-content: center; }
    .btn { display: inline-flex; align-items: center; justify-content: center; gap: 6px; border: none; border-radius: 7px; cursor: pointer; font-family: 'Be Vietnam Pro',sans-serif; font-weight: 600; transition: all .22s; }
    .btn-teal { background: var(--teal); color: var(--bg); font-size: 13px; padding: 7px 18px; }
    .btn-teal:hover { background: #00EEEE; box-shadow: 0 0 22px var(--teal-glow-strong); transform: translateY(-1px); }

    /* LAYOUT */
    .wrap { max-width: 1100px; margin: 0 auto; padding: 0 40px; }

    .breadcrumb a { color: var(--text-3); text-decoration: none; transition: color .2s; }
    .breadcrumb a:hover { color: var(--teal); }
    .breadcrumb .sep { color: var(--border-2); }
    .breadcrumb .cur { color: var(--text-2); font-weight: 600; }

    /* POST HEADER */
    .post-header { padding: 32px 0 0; }
    .post-cat-row { display: flex; align-items: center; gap: 10px; margin-bottom: 14px; }
    .post-cat { background: var(--teal-glow); border: 1px solid var(--teal-dark); color: var(--teal); font-size: 11px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; padding: 4px 12px; border-radius: 20px; }
    .post-read-time { font-size: 12px; color: var(--text-3); display: flex; align-items: center; gap: 5px; }
    .post-title { font-family: 'Exo 2','Be Vietnam Pro',sans-serif; font-size: 34px; font-weight: 900; line-height: 1.2; color: var(--text); margin-bottom: 16px; }
    .post-meta { display: flex; align-items: center; gap: 18px; font-size: 12.5px; color: var(--text-3); margin-bottom: 28px; flex-wrap: wrap; }

    .post-cover-shine { position: absolute; top: 0; left: -100%; width: 60%; height: 100%; background: linear-gradient(90deg,transparent,rgba(255,255,255,.04),transparent); animation: shine 3s ease-in-out infinite; }
    @keyframes shine { 0%{left:-100%} 100%{left:200%} }

    /* CONTENT AREA */

    .post-content { font-size: 15.5px; line-height: 1.85; color: var(--text-2); }
    .post-content h2 { font-family: 'Exo 2','Be Vietnam Pro',sans-serif; font-size: 22px; font-weight: 800; color: var(--text); margin: 36px 0 14px; padding-bottom: 10px; border-bottom: 1px solid var(--border); }
    .post-content h3 { font-size: 17px; font-weight: 700; color: var(--text); margin: 26px 0 10px; }

    .post-content ul, .post-content ol { margin: 14px 0 18px 22px; }

    .post-content blockquote { border-left: 3px solid var(--teal); padding: 14px 20px; background: var(--bg-3); border-radius: 0 8px 8px 0; margin: 24px 0; color: var(--text); font-style: italic; font-size: 15px; }

    /* CTA PRODUCT BOX */
    .product-cta { background: var(--bg-3); border: 1px solid var(--border-2); border-radius: 14px; padding: 24px; margin: 36px 0; position: relative; overflow: hidden; }
    .product-cta::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px; background: linear-gradient(90deg, var(--teal), #00B4D8, transparent); }
    .product-cta-label { font-size: 10.5px; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; color: var(--teal); margin-bottom: 10px; }
    .product-cta-name { font-family: 'Exo 2','Be Vietnam Pro',sans-serif; font-size: 20px; font-weight: 800; color: var(--text); margin-bottom: 8px; }
    .product-cta-desc { font-size: 13.5px; color: var(--text-2); line-height: 1.6; margin-bottom: 18px; }
    .product-cta-row { display: flex; align-items: center; gap: 16px; }
    .product-cta-price { font-size: 22px; font-weight: 800; color: var(--teal); }
    .btn-cta { display: inline-flex; align-items: center; gap: 8px; background: var(--teal); color: var(--bg); font-family: 'Be Vietnam Pro',sans-serif; font-size: 14px; font-weight: 700; padding: 10px 24px; border-radius: 8px; text-decoration: none; transition: all .22s; border: none; cursor: pointer; }
    .btn-cta:hover { background: #00EEEE; box-shadow: 0 0 24px var(--teal-glow-strong); transform: translateY(-1px); }

    /* AUTHOR / SHARE */
    .post-author-box { background: var(--bg-3); border: 1px solid var(--border); border-radius: 12px; padding: 20px 24px; margin: 36px 0; display: flex; align-items: center; gap: 16px; }
    .author-avatar { width: 52px; height: 52px; border-radius: 50%; background: linear-gradient(135deg,var(--teal),#0088A8); display: flex; align-items: center; justify-content: center; font-size: 22px; flex-shrink: 0; }
    .author-name { font-weight: 700; color: var(--text); font-size: 14.5px; margin-bottom: 4px; }
    .author-bio { font-size: 12.5px; color: var(--text-3); line-height: 1.5; }

    /* SIDEBAR */
    .post-sidebar {}
    .sb-box { background: var(--bg-2); border: 1px solid var(--border); border-radius: 12px; padding: 20px; margin-bottom: 20px; }
    .sb-head { font-family: 'Exo 2','Be Vietnam Pro',sans-serif; font-size: 11px; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; color: var(--teal); margin-bottom: 16px; }
    .toc-list { list-style: none; display: flex; flex-direction: column; gap: 2px; }
    .toc-list a { display: block; font-size: 13px; color: var(--text-2); text-decoration: none; padding: 6px 10px; border-radius: 6px; transition: all .2s; border-left: 2px solid transparent; }
    .toc-list a:hover { color: var(--teal); background: var(--teal-glow); border-left-color: var(--teal); }
    .related-list { display: flex; flex-direction: column; gap: 12px; }
    .rel-item { display: flex; gap: 10px; text-decoration: none; color: inherit; padding: 8px; border-radius: 8px; transition: background .2s; }
    .rel-item:hover { background: var(--bg-3); }
    .rel-img { width: 44px; height: 44px; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 20px; flex-shrink: 0; }
    .rel-info {}
    .rel-title { font-size: 12.5px; font-weight: 600; color: var(--text); line-height: 1.4; margin-bottom: 3px; }
    .rel-cat { font-size: 11px; color: var(--text-3); }
    .tag-cloud { display: flex; flex-wrap: wrap; gap: 7px; }
    .tc-tag { font-size: 12px; font-weight: 600; color: var(--text-2); background: var(--bg-3); border: 1px solid var(--border); padding: 5px 12px; border-radius: 20px; text-decoration: none; cursor: pointer; transition: all .2s; }
    .tc-tag:hover { color: var(--teal); border-color: var(--teal-dark); background: var(--teal-glow); }

    /* BACK BTN */
    .back-btn { display: inline-flex; align-items: center; gap: 7px; font-size: 13px; font-weight: 600; color: var(--text-2); text-decoration: none; padding: 8px 14px; border-radius: 8px; border: 1px solid var(--border); background: var(--bg-3); transition: all .2s; margin: 28px 0 0; }
    .back-btn:hover { color: var(--teal); border-color: var(--teal-dark); background: var(--teal-glow); }

    /* LOADING / 404 */
    .post-loading { text-align: center; padding: 120px 0; color: var(--text-3); }
    .post-loading .spin { width: 36px; height: 36px; border: 3px solid var(--border); border-top-color: var(--teal); border-radius: 50%; animation: spin .8s linear infinite; margin: 0 auto 20px; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .post-404 { text-align: center; padding: 100px 0; }
    .post-404 .icon-404 { font-size: 60px; margin-bottom: 20px; }
    .post-404 h2 { font-size: 22px; color: var(--text); margin-bottom: 10px; }

    /* FOOTER */
    footer { background: var(--bg-2); border-top: 1px solid var(--border); padding: 32px 40px; text-align: center; }
    .ft-logo { font-family: 'Exo 2','Be Vietnam Pro',sans-serif; font-size: 16px; font-weight: 800; color: var(--teal); letter-spacing: 1.5px; margin-bottom: 8px; }
    .ft-copy { font-size: 12px; color: var(--text-3); }

    @media (max-width: 900px) {
      .post-layout { grid-template-columns: 1fr; }
      .post-sidebar { display: none; }
      .post-title { font-size: 26px; }
      .nav { padding: 0 16px; }
      .wrap { padding: 0 16px; }
    }

const POSTS = {
  'nhan-tinh-la-gi': {
    slug: 'nhan-tinh-la-gi',
    title: 'Nhân tính là gì? Vì sao hiểu người là kỹ năng quan trọng nhất trong cuộc sống?',
    cat: 'Nhân tính',
    emoji: '',
    bg: 'linear-gradient(145deg,#0F1D38,#091525)',
    date: '20/04/2025',
    readTime: '5 phút',
    views: '348',
    tags: ['Nhân tính', 'Kỹ năng mềm'],
    productSlug: null,
    toc: [
      'Nhân tính là gì?',
      'Tại sao hiểu người quan trọng?',
      'Những dấu hiệu nhận biết nhân tính',
      'Cách phát triển kỹ năng đọc người',
      'Kết luận'
    ],
    content: `
      <h2>Nhân tính là gì?</h2>
      <p>Nhân tính — hai chữ nghe có vẻ triết học, nhưng thực ra đây là thứ bạn đối mặt mỗi ngày trong từng cuộc trò chuyện, từng quyết định, từng mối quan hệ. <strong>Nhân tính là tổng hòa của bản năng, cảm xúc, động cơ và hành vi</strong> tạo nên một con người — phần cốt lõi mà dù ai cũng che giấu nhưng không bao giờ hoàn toàn che được.</p>
      <p>Hiểu nhân tính không phải là trở nên hoài nghi hay xem người khác như công cụ. Ngược lại, đó là khả năng nhìn thấy con người thật đằng sau lớp vỏ xã hội — để thấu cảm sâu hơn, kết nối chân thật hơn, và đưa ra quyết định sáng suốt hơn.</p>
      <blockquote>"Kẻ thức thời mới là tuấn kiệt — người hiểu người mới là bậc thầy." — Trích Tuyệt Mật Nhân Tính</blockquote>

      <h2>Tại sao hiểu người quan trọng?</h2>
      <p>Hầu hết thất bại trong cuộc sống — không phải vì thiếu kỹ năng hay thiếu kiến thức. Mà vì <strong>hiểu sai người</strong>. Bạn tin sai người để mất tiền. Bạn đánh giá thấp đối thủ để thua cuộc. Bạn không nhận ra được lòng tốt thật sự nên đẩy đi người đáng giữ lại.</p>
      <p>Kỹ năng đọc người không được dạy trong trường học, nhưng nó quyết định đến 80% thành công của bạn trong:</p>
      <ul>
        <li>Kinh doanh và đàm phán</li>
        <li>Tuyển dụng và quản lý nhân sự</li>
        <li>Tình cảm và hôn nhân</li>
        <li>Kết bạn và xây dựng mạng lưới</li>
        <li>Tránh khỏi những người độc hại</li>
      </ul>

      <h2>Những dấu hiệu nhận biết nhân tính</h2>
      <p>Có những tín hiệu mà con người tiết lộ vô thức — nếu bạn biết quan sát:</p>
      <div class="highlight-box">
        <strong>Ngôn ngữ cơ thể:</strong> Ánh mắt né tránh khi nói dối, giọng nói cao hơn khi căng thẳng, cử chỉ che miệng khi không tự tin. Não bộ không thể điều khiển tất cả cùng lúc — luôn có sự rò rỉ.
      </div>
      <p>Ngoài ngôn ngữ thể chất, còn có <strong>nhân tính hành động</strong> — người ta không nói với bạn họ là ai, họ chỉ cho bạn thấy qua việc làm. Ai ở bên bạn lúc khó khăn? Ai chỉ xuất hiện khi bạn có ích? Đó là bộ lọc nhân tính chính xác nhất.</p>

      <h2>Cách phát triển kỹ năng đọc người</h2>
      <p>Đây không phải năng khiếu bẩm sinh — đây là kỹ năng có thể học và luyện tập. Bắt đầu từ ba thói quen:</p>
      <ol>
        <li><strong>Quan sát nhiều hơn nói:</strong> Người nói ít quan sát nhiều bao giờ cũng hiểu người hơn người nói nhiều. Trong mỗi cuộc trò chuyện, hãy dành 30% thời gian quan sát phản ứng phi ngôn ngữ của đối phương.</li>
        <li><strong>Hỏi câu hỏi mở:</strong> Thay vì hỏi "Bạn có thích không?", hãy hỏi "Bạn nghĩ gì về điều này?". Câu trả lời dài tiết lộ nhiều hơn câu trả lời có/không.</li>
        <li><strong>Kiểm chứng theo thời gian:</strong> Đừng đánh giá người qua một lần gặp. Hành vi nhất quán trong nhiều tình huống khác nhau mới là nhân tính thật.</li>
      </ol>

      <h2>Kết luận</h2>
      <p>Nhân tính là môn học cả đời. Bạn không thể học xong trong một ngày, nhưng bạn có thể bắt đầu từ hôm nay — bằng cách quan sát nhiều hơn, phán xét ít hơn, và hiểu rằng mỗi người đều mang trong mình một thế giới phức tạp đáng khám phá.</p>
      <p>Người hiểu nhân tính không sợ bị lợi dụng, không bị lừa dối mãi mãi — vì họ thấy rõ bản chất trước khi hậu quả xảy ra.</p>

        <li><strong>Đòn bẩy con người:</strong> Xây đội nhóm làm những gì bạn làm — nhân kết quả lên nhiều lần</li>
        <li><strong>Đòn bẩy hệ thống:</strong> Tạo quy trình tự động chạy dù bạn có mặt hay không</li>
        <li><strong>Đòn bẩy nội dung:</strong> Một sản phẩm số, một bài viết, một khóa học — tạo ra một lần, bán mãi mãi</li>
      </ul>

      <h2>Xây dựng tự do tài chính thật sự</h2>
      <p>Tự do tài chính không phải là con số trong tài khoản — đó là khi thu nhập thụ động lớn hơn chi phí sống. Đây là ngưỡng cụ thể, có thể tính được và có thể đạt được với kế hoạch đúng.</p>
      <p>Bước 1: Tính rõ chi phí sống tối thiểu của bạn (không phải hiện tại — mà là lifestyle bạn thật sự muốn).<br>
      Bước 2: Xây dựng tài sản tạo thu nhập thụ động đủ để cover số đó.<br>
      Bước 3: Tiếp tục — nhưng bây giờ bạn làm vì muốn, không phải vì phải.</p>

      <h2>Cái bẫy của sự giàu có</h2>
      <p>Paradox nổi tiếng: nhiều người giàu không hạnh phúc hơn người có thu nhập trung bình. Lý do: <strong>họ leo thang tham chiếu (lifestyle inflation)</strong> — mỗi lần kiếm được nhiều hơn, kỳ vọng cũng tăng theo, và cảm giác "đủ" không bao giờ đến.</p>
      <p>Mưu lược tài chính thật sự là biết khi nào đủ — và đủ dũng cảm để dừng leo.</p>

function getSlug() {
  return new URLSearchParams(window.location.search).get('slug') || '';
}

function renderPost(post) {
  document.title = post.title + ' — Thư viện Sơn Nhai';

  // SEO: Update meta tags dynamically
  const metaDesc = document.querySelector('meta[name="description"]');
  if (metaDesc) metaDesc.content = post.excerpt || post.title;
  const ogTitle = document.querySelector('meta[property="og:title"]');
  if (ogTitle) ogTitle.content = post.title + ' — Thư viện Sơn Nhai';
  const ogDesc = document.querySelector('meta[property="og:description"]');
  if (ogDesc) ogDesc.content = post.excerpt || post.title;
  const canonical = document.querySelector('link[rel="canonical"]');
  if (canonical) canonical.href = 'https://thuviensonnhai.com/blog-post?slug=' + post.slug;
  const ogUrl = document.querySelector('meta[property="og:url"]');
  if (ogUrl) ogUrl.content = 'https://thuviensonnhai.com/blog-post?slug=' + post.slug;

  // SEO: JSON-LD structured data
  const jsonLd = document.createElement('script');
  jsonLd.type = 'application/ld+json';
  jsonLd.textContent = JSON.stringify({
    "@context": "https://schema.org",
    "@type": "Article",
    "headline": post.title,
    "description": post.excerpt || '',
    "author": { "@type": "Organization", "name": "Thư viện Sơn Nhai" },
    "publisher": { "@type": "Organization", "name": "Thư viện Sơn Nhai", "url": "https://thuviensonnhai.com" },
    "datePublished": post.createdAt || '',
    "mainEntityOfPage": "https://thuviensonnhai.com/blog-post?slug=" + post.slug

  document.head.appendChild(jsonLd);

  const tocHTML = post.toc.map((item, i) =>
    `<li><a href="#section-${i}">${item}</a></li>`

  const relatedHTML = post.related.map(r => `

      <div class="rel-info">
        <div class="rel-title">${r.title}</div>
        <div class="rel-cat">${r.cat}</div>

    </a>
  `).join('');

  const tagsHTML = post.tags.map(t => `<span class="post-tag">${t}</span>`).join('');

        </a>
      </div>
    </div>
  ` : '';

  // Inject section IDs into h2 tags
  let contentWithIds = post.content;
  let sectionIdx = 0;
  contentWithIds = contentWithIds.replace(/<h2>/g, () => `<h2 id="section-${sectionIdx++}">`);

  const html = `

      <span class="sep">›</span>
      <a href="blog.html">Blog</a>

      <div class="post-cover-shine"></div>
    </div>

    <div class="post-layout">
      <div class="post-body">
        <div class="post-content">
          ${contentWithIds}
        </div>

            <a class="tc-tag" href="blog.html">Hệ thống</a>
          </div>
        </div>
      </aside>
    </div>
  `;

  document.getElementById('post-container').innerHTML = html;
