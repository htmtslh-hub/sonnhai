        coverGradient: 'linear-gradient(145deg, #0A0A2E, #1B1B4E)',

    let doneCount = 0, skipCount = 0, errCount = 0;

    function log(msg, cls = '') {
      const el = document.getElementById('log');
      el.innerHTML += `<div class="${cls}">${msg}</div>`;
      el.scrollTop = el.scrollHeight;
    }

    function updateStats() {
      document.getElementById('s-done').textContent = doneCount;
      document.getElementById('s-skip').textContent = skipCount;
      document.getElementById('s-err').textContent = errCount;
    }

    window.startSync = async function() {
      const btn = document.getElementById('btn');
      btn.disabled = true;
      btn.textContent = 'Đang đồng bộ...';

      // Check auth
      const user = auth.currentUser;
      if (!user) {
        log(' Chưa đăng nhập! Hãy mở admin.html đăng nhập trước, rồi quay lại đây.', 'err');
        btn.disabled = false;
        btn.textContent = ' Bắt đầu đồng bộ';
        return;
      }
      log(`✓ Đã đăng nhập: ${user.email}`, 'ok');

      // Get existing products
      let existingSlugs = [];
      try {
        const snap = await getDocs(collection(db, 'products'));
        existingSlugs = snap.docs.map(d => d.data().slug);
        log(` Firestore hiện có ${snap.size} sản phẩm`, 'info');
      } catch(e) {
        log(' Không thể đọc sản phẩm hiện có: ' + e.message, 'warn');
      }

      // Sync each product
      for (const p of PRODUCTS) {
        try {
          if (existingSlugs.includes(p.slug)) {
            // Update existing
            const q2 = query(collection(db, 'products'), where('slug', '==', p.slug));
            const snap2 = await getDocs(q2);
            if (!snap2.empty) {
              const existingDoc = snap2.docs[0];
              const existingData = existingDoc.data();
              // Only update fields that matter, preserve sold_count etc
              await setDoc(doc(db, 'products', existingDoc.id), {
                ...existingData,
                name: p.name,
                emoji: p.emoji,
                category: p.category,
                price: p.price,
                originalPrice: p.originalPrice,
                description: p.description,
                imageUrl: p.imageUrl,
                format: p.format,
                pages: p.pages,
                coverGradient: p.coverGradient,
                status: 'published',
                updatedAt: serverTimestamp(),
              });
              log(` Cập nhật: ${p.name}`, 'warn');
              skipCount++;
            }
          } else {
            // Create new
            const newRef = doc(collection(db, 'products'));
            await setDoc(newRef, {
              name: p.name,
              slug: p.slug,
              emoji: p.emoji,
              category: p.category,
              price: p.price,
              originalPrice: p.originalPrice,
              description: p.description,
              imageUrl: p.imageUrl,
              format: p.format,
              pages: p.pages,
              coverGradient: p.coverGradient,
              status: 'published',
              soldCount: 0,
              sold_count: 0,
              rating: 4.5,
              createdAt: serverTimestamp(),
              updatedAt: serverTimestamp(),
            });
            log(` Tạo mới: ${p.name}`, 'ok');
            doneCount++;
          }
        } catch(e) {
          log(` Lỗi "${p.name}": ${e.message}`, 'err');
          errCount++;
        }
        updateStats();
      }

      log('', '');
      log(`══════════════════════════════`, 'info');
      log(`✓ HOÀN TẤT! Tạo mới: ${doneCount} | Cập nhật: ${skipCount} | Lỗi: ${errCount}`, 'ok');
      log(`Lưu ý: Ảnh sản phẩm "Thương chiến" dùng định dạng .jpeg (chưa convert sang .webp)`, 'info');
      btn.textContent = ' Hoàn tất!';
    };

        name: 'Combo Nhân Tính',

        description: 'Bộ 4 cuốn sách nhân tính học giúp bạn thấu hiểu bản chất con người',

        productSlugs: ['thuc-tinh-nhan-thuc', 'logic-nguoi-ngheo', 'he-thong-manh-me', 'tu-duy-sau-sac', 'tu-duy-cuong-gia', 'muu-luoc-tuoi-tre'],
        originalPrice: 774000,
        comboPrice: 399000,

        description: 'Bộ 5 cuốn sách chiến lược tài chính và kinh doanh',
        productSlugs: ['muu-luoc-tai-chinh', 'thuong-chien', 'goc-nhin-tao-lap', 'ban-chat-tai-chinh', 'an-chua-huyen-co'],
        originalPrice: 845000,
        comboPrice: 399000,
        order: 3,
        tag: 'ƯU ĐÃI HOT',
      },
    ];

    window.startComboSync = async function() {
      const user = auth.currentUser;
      if (!user) {
        log(' Chưa đăng nhập!', 'err');
        return;
      }
      log('', '');
      log('══════ SYNC COMBOS ══════', 'info');

      // Get product IDs from slugs
      const allProducts = await getDocs(collection(db, 'products'));
      const slugToId = {};
      allProducts.docs.forEach(d => { slugToId[d.data().slug] = d.id; });

      for (const combo of COMBOS) {
        try {
          const productIds = combo.productSlugs.map(s => slugToId[s]).filter(Boolean);
          const q2 = query(collection(db, 'combos'), where('slug', '==', combo.slug));
          const snap = await getDocs(q2);

          const comboData = {
            name: combo.name,
            slug: combo.slug,
            description: combo.description,
            productIds: productIds,
            productSlugs: combo.productSlugs,
            originalPrice: combo.originalPrice,
            comboPrice: combo.comboPrice,
            order: combo.order,
            tag: combo.tag,
            status: 'published',
            updatedAt: serverTimestamp(),
          };

          if (!snap.empty) {
            await setDoc(doc(db, 'combos', snap.docs[0].id), { ...snap.docs[0].data(), ...comboData });
            log(` Cập nhật combo: ${combo.name}`, 'warn');
          } else {
            const newRef = doc(collection(db, 'combos'));
            await setDoc(newRef, { ...comboData, createdAt: serverTimestamp() });
            log(` Tạo mới combo: ${combo.name}`, 'ok');
          }
        } catch(e) {
          log(` Lỗi combo "${combo.name}": ${e.message}`, 'err');
        }
      }
      log('✓ COMBO SYNC HOÀN TẤT!', 'ok');
    };

    // Check auth on load
    onAuthStateChanged(auth, (user) => {
      if (user) {
        log(` Đã đăng nhập: ${user.email}`, 'ok');
      } else {
        log(' Chưa đăng nhập. Hãy mở admin.html đăng nhập trước rồi quay lại.', 'warn');
      }
    });
