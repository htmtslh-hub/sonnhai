<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <title>Test Login</title>
  <style>
    body { font-family: Arial; padding: 50px; background: #0A0A0F; color: white; }
    .form-group { margin-bottom: 15px; }
    input { padding: 10px; width: 300px; }
    button { padding: 10px 20px; background: #00D4D4; border: none; cursor: pointer; }
    #result { margin-top: 20px; padding: 15px; background: #1a1a1a; border-radius: 8px; }
  </style>
</head>
<body>
  <h2>Test Login Form</h2>
  <form id="login-form">
    <div class="form-group">
      <label>Email:</label><br>
      <input type="email" id="login-email" value="admin@sonnhai.com" required>
    </div>
    <div class="form-group">
      <label>Password:</label><br>
      <input type="password" id="login-password" value="admin123" required>
    </div>
    <button type="submit">Đăng nhập</button>
  </form>

  <div id="result"></div>

  <script>
    document.addEventListener('DOMContentLoaded', function() {
      const form = document.getElementById('login-form');
      const result = document.getElementById('result');

      result.innerHTML = '<strong>Status:</strong> Form loaded successfully!';

      form.addEventListener('submit', function(e) {
        e.preventDefault();

        const email = document.getElementById('login-email').value;
        const password = document.getElementById('login-password').value;

        result.innerHTML = `
          <strong>Form submitted!</strong><br>
          Email: ${email}<br>
          Password: ${password}<br>
          <br>
          ${email === 'admin@sonnhai.com' && password === 'admin123'
            ? '<span style="color: #00D4D4;">✓ Login SUCCESS!</span>'
            : '<span style="color: red;">✗ Login FAILED!</span>'}
        `;
      });
    });
  </script>
</body>
</html>
