<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kết quả thanh toán — Thư viện Sơn Nhai</title>
  <meta name="robots" content="noindex, nofollow">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Exo+2:wght@400;700;800;900&family=Be+Vietnam+Pro:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --bg: #08090E; --bg-2: #0D1018; --bg-3: #12161F;
      --border: #1C2232; --border-2: #252D3F;
      --teal: #00D4D4; --teal-glow: rgba(0,212,212,0.12);
      --teal-glow-strong: rgba(0,212,212,0.25);
      --text: #DDE1EC; --text-2: #8B93A8; --text-3: #555F75;
      --red: #EF4444; --green: #10B981;
    }
    html { scroll-behavior: smooth; }
    body { font-family: 'Be Vietnam Pro', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; display: flex; flex-direction: column; }

    /* ── NAVBAR ── */
    .nav {
      position: sticky; top: 0; z-index: 200; height: 52px;
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 40px;
      background: rgba(8,9,14,.95); backdrop-filter: blur(16px);
      border-bottom: 1px solid var(--border);
    }
    .nav-logo { display:inline-flex;align-items:center;gap:8px;font-family:'Exo 2','Be Vietnam Pro',sans-serif; font-size: 15px; font-weight: 800; color: var(--teal); letter-spacing: 1.5px; text-decoration: none; }
    .nav-logo span { color: var(--text-3); font-weight: 500; }
    .nav-right { display: flex; align-items: center; gap: 10px; }

    /* ── MAIN ── */
    .page-wrap {
      flex: 1; display: flex; align-items: center; justify-content: center;
      padding: 60px 20px;
    }
    .result-card {
      background: var(--bg-2); border: 1px solid var(--border);
      border-radius: 20px; padding: 48px 40px; max-width: 520px; width: 100%;
      text-align: center; position: relative; overflow: hidden;
    }
    .result-card::before {
      content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px;
    }
    .result-card.success::before { background: linear-gradient(90deg, var(--teal), #00EEEE); }
    .result-card.failed::before  { background: linear-gradient(90deg, var(--red), #FF6B6B); }
    .result-card.pending::before { background: linear-gradient(90deg, #F5A623, #FFD166); }

    .icon-wrap {
      width: 80px; height: 80px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 24px; font-size: 36px;
    }
    .icon-wrap.success { background: rgba(16,185,129,.12); border: 2px solid rgba(16,185,129,.3); }
    .icon-wrap.failed  { background: rgba(239,68,68,.1);   border: 2px solid rgba(239,68,68,.25); }
    .icon-wrap.pending { background: rgba(245,166,35,.1);  border: 2px solid rgba(245,166,35,.25); }

    .result-title {
      font-family: 'Exo 2', sans-serif; font-size: 24px; font-weight: 800;
      margin-bottom: 10px;
    }
    .result-title.success { color: var(--teal); }
    .result-title.failed  { color: var(--red); }
    .result-title.pending { color: #F5A623; }

    .result-sub { font-size: 14px; color: var(--text-2); line-height: 1.7; margin-bottom: 28px; }

    .info-box {
      background: var(--bg-3); border: 1px solid var(--border-2);
      border-radius: 12px; padding: 16px 20px;
      display: flex; flex-direction: column; gap: 10px;
      text-align: left; margin-bottom: 28px;
    }
    .info-row { display: flex; justify-content: space-between; font-size: 13px; gap: 12px; }
    .info-key { color: var(--text-3); white-space: nowrap; }
    .info-val { font-weight: 600; color: var(--text); text-align: right; }
    .info-val.teal { color: var(--teal); }

    .btn-group { display: flex; flex-direction: column; gap: 10px; }
    .btn-primary {
      width: 100%; padding: 14px; border: none; border-radius: 10px;
      font-family: 'Be Vietnam Pro', sans-serif; font-size: 14px; font-weight: 700;
      background: var(--teal); color: #000; cursor: pointer; transition: all .25s;
      text-decoration: none; display: flex; align-items: center; justify-content: center; gap: 8px;
    }
    .btn-primary:hover { background: #00EEEE; box-shadow: 0 0 24px var(--teal-glow-strong); }
    .btn-secondary {
      width: 100%; padding: 13px; border: 1px solid var(--border-2); border-radius: 10px;
      font-family: 'Be Vietnam Pro', sans-serif; font-size: 14px; font-weight: 600;
      background: transparent; color: var(--text-2); cursor: pointer; transition: all .25s;
      text-decoration: none; display: flex; align-items: center; justify-content: center; gap: 8px;
    }
    .btn-secondary:hover { border-color: var(--teal); color: var(--teal); }

    /* spinner */
    .spinner {
      width: 40px; height: 40px; border: 3px solid var(--border-2);
      border-top-color: var(--teal); border-radius: 50%;
      animation: spin .8s linear infinite; margin: 0 auto 20px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
  <link rel="stylesheet" href="css/parallax-animations.css">
  <link rel="stylesheet" href="css/responsive.css?v=1">
</head>
<body>

<!-- PARALLAX CANVAS BACKGROUND -->
<canvas id="parallax-canvas"></canvas>


<nav class="nav">
  <a href="index.html" class="nav-logo"><div style="width:36px;height:36px;border-radius:9px;background:var(--teal);display:flex;align-items:center;justify-content:center;font-family:'Exo 2',sans-serif;font-weight:900;font-size:14px;color:var(--bg);flex-shrink:0;">SN</div>Thư viện <span>Sơn Nhai</span></a>
  <div class="nav-right">
    <div id="nav-auth-slot"></div>
  </div>
</nav>

<div class="page-wrap">
  <!-- Loading state -->
  <div id="loading-card" class="result-card" style="padding:60px 40px;">
    <div class="spinner"></div>
    <div style="font-size:15px;color:var(--text-2);">Đang xác nhận kết quả thanh toán…</div>
  </div>

  <!-- Result card (hidden initially) -->
  <div id="result-card" class="result-card" style="display:none;">
    <div class="icon-wrap" id="result-icon"></div>
    <div class="result-title" id="result-title"></div>
    <div class="result-sub" id="result-sub"></div>
    <div class="info-box" id="info-box" style="display:none;"></div>
    <div class="btn-group" id="btn-group"></div>
  </div>
</div>

<script>
(async function () {
  const params       = new URLSearchParams(window.location.search);
  const orderNumber  = params.get('orderNumber') || '';
  const status       = params.get('status') || '';
  const valid        = params.get('valid') === '1';
  const transId      = params.get('transactionId') || '';

  const loadingCard  = document.getElementById('loading-card');
  const resultCard   = document.getElementById('result-card');

  function show(type, title, sub, infoRows, buttons) {
    loadingCard.style.display = 'none';
    resultCard.style.display  = 'block';
    resultCard.className = `result-card ${type}`;

    const iconMap = { success: '✅', failed: '❌', pending: '⏳' };
    document.getElementById('result-icon').className = `icon-wrap ${type}`;
    document.getElementById('result-icon').textContent = iconMap[type] || '📋';
    document.getElementById('result-title').className = `result-title ${type}`;
    document.getElementById('result-title').textContent = title;
    document.getElementById('result-sub').textContent = sub;

    if (infoRows && infoRows.length) {
      const box = document.getElementById('info-box');
      box.style.display = 'flex';
      box.innerHTML = infoRows.map(([k, v, teal]) =>
        `<div class="info-row"><span class="info-key">${k}</span><span class="info-val${teal ? ' teal' : ''}">${v}</span></div>`
      ).join('');
    }

    const grp = document.getElementById('btn-group');
    grp.innerHTML = buttons.map(b =>
      b.primary
        ? `<a href="${b.href}" class="btn-primary">${b.label}</a>`
        : `<a href="${b.href}" class="btn-secondary">${b.label}</a>`
    ).join('');
  }

  // Nếu không có orderNumber → người dùng truy cập trực tiếp
  if (!orderNumber) {
    show('failed', 'Không tìm thấy đơn hàng', 'Vui lòng quay lại trang checkout.', [], [
      { label: 'Quay lại thanh toán', href: 'checkout.html', primary: true },
      { label: 'Về trang chủ', href: 'index.html' },
    ]);
    return;
  }

  // Poll status từ backend (IPN có thể đến trước hoặc sau redirect)
  let attempts = 0;
  const maxAttempts = 8;

  async function checkStatus() {
    try {
      const res  = await fetch(`/api/seapay/status?orderNumber=${orderNumber}`, { credentials: 'include' });
      const data = await res.json();

      if (!data.success) {
        show('failed', 'Không tìm thấy đơn hàng', `Mã đơn: ${orderNumber}`, [], [
          { label: 'Về trang chủ', href: 'index.html', primary: true },
        ]);
        return;
      }

      const { paymentStatus, downloadTokens } = data.data;

      if (paymentStatus === 'paid') {
        // Lấy thông tin đơn từ session hoặc API
        const savedOrder = (() => {
          try { return JSON.parse(sessionStorage.getItem('sonhai_last_order') || 'null'); } catch { return null; }
        })();

        const total = savedOrder ? savedOrder.total : null;
        const infoRows = [
          ['Mã đơn hàng', orderNumber],
          ['Phương thức', 'SeaPay'],
          ...(total ? [['Số tiền', total.toLocaleString('vi-VN') + 'đ', true]] : []),
          ...(transId ? [['Mã giao dịch', transId]] : []),
        ];

        // Đặt order vào sessionStorage để thank-you.html đọc được
        if (!savedOrder || savedOrder.paymentStatus !== 'paid') {
          const merged = { ...(savedOrder || {}), orderNumber, paymentStatus: 'paid', downloadTokens };
          sessionStorage.setItem('sonhai_last_order', JSON.stringify(merged));
        }

        show(
          'success',
          'Thanh toán thành công!',
          'Cảm ơn bạn đã mua hàng. File tải về và thông tin đơn hàng đã được gửi đến email của bạn.',
          infoRows,
          [
            { label: '📦 Xem đơn hàng & tải file', href: 'thank-you.html', primary: true },
            { label: 'Tiếp tục mua sắm', href: 'index.html' },
          ]
        );
        return;
      }

      if (paymentStatus === 'failed') {
        show(
          'failed',
          'Thanh toán thất bại',
          'Giao dịch không thành công. Vui lòng thử lại hoặc chọn phương thức thanh toán khác.',
          [['Mã đơn hàng', orderNumber]],
          [
            { label: 'Thử lại thanh toán', href: `checkout.html`, primary: true },
            { label: 'Về trang chủ', href: 'index.html' },
          ]
        );
        return;
      }

      // Vẫn pending → thử lại
      attempts++;
      if (attempts < maxAttempts) {
        setTimeout(checkStatus, 2000);
      } else {
        // Hết lần thử → có thể IPN chưa đến
        show(
          'pending',
          'Đang xử lý thanh toán',
          'Giao dịch đang được xác nhận. Vui lòng chờ trong giây lát hoặc kiểm tra email của bạn.',
          [
            ['Mã đơn hàng', orderNumber],
            ['Trạng thái', 'Đang xử lý'],
          ],
          [
            { label: '🔄 Kiểm tra lại', href: window.location.href, primary: true },
            { label: 'Liên hệ hỗ trợ', href: 'support.html' },
          ]
        );
      }
    } catch {
      attempts++;
      if (attempts < maxAttempts) setTimeout(checkStatus, 2000);
    }
  }

  // Nếu SeaPay gửi status trong URL → dùng để xác định nhanh trạng thái
  if (status === 'success' || status === '1' || status === 'completed') {
    // Vẫn cần verify với backend
    checkStatus();
  } else if (status && status !== '' && status !== 'success' && status !== '1') {
    // Status rõ ràng là thất bại
    show(
      'failed',
      'Thanh toán thất bại',
      'Giao dịch không được hoàn tất. Vui lòng thử lại.',
      [['Mã đơn hàng', orderNumber]],
      [
        { label: 'Thử lại thanh toán', href: 'checkout.html', primary: true },
        { label: 'Về trang chủ', href: 'index.html' },
      ]
    );
  } else {
    // Không có status trong URL → poll backend
    checkStatus();
  }
})();
</script>

<script type="module" src="/auth-ui.js"></script>
<script src="js/parallax-engine.js?v=grid-particles-2"></script>
<script src="js/mobile-menu.js?v=1"></script>
</body>
</html>
