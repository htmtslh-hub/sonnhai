<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <link rel="icon" type="image/png" href="/logo.png">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Đặt hàng thành công — Thư viện Sơn Nhai</title>
  <meta name="robots" content="noindex, nofollow">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Exo+2:wght@600;700;800&family=Be+Vietnam+Pro:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: #0A0A0F;
      --surface: #0F1117;
      --border: #1E2433;
      --teal: #00D4D4;
      --teal-dim: #00B4CC;
      --text: #E8EAF0;
      --text-muted: #6B7280;
      --green: #10B981;
    }

    body {
      font-family: 'Be Vietnam Pro', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* Navbar */
    .nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 32px;
      border-bottom: 1px solid var(--border);
      background: rgba(15, 17, 23, 0.8);
      backdrop-filter: blur(12px);
    }

    .nav-logo { display:inline-flex;align-items:center;gap:8px;
      display:inline-flex;align-items:center;gap:8px;font-family: 'Exo 2', sans-serif;
      font-size: 18px;
      font-weight: 800;
      color: var(--teal);
      text-decoration: none;
      letter-spacing: 0.5px;
    }

    .nav-links {
      display: flex;
      gap: 24px;
      list-style: none;
    }

    .nav-links a {
      color: var(--text-muted);
      text-decoration: none;
      font-size: 14px;
      font-weight: 500;
      transition: color 0.2s;
    }

    .nav-links a:hover {
      color: var(--text);
    }

    /* Main Content */
    .container {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
    }

    .success-card {
      max-width: 600px;
      width: 100%;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 48px 40px;
      text-align: center;
      position: relative;
      overflow: hidden;
    }

    .success-card::before {
      content: '';
      position: absolute;
      top: -50%;
      left: -50%;
      width: 200%;
      height: 200%;
      background: radial-gradient(circle, rgba(0, 212, 212, 0.08) 0%, transparent 70%);
      pointer-events: none;
    }

    .success-icon {
      width: 80px;
      height: 80px;
      margin: 0 auto 24px;
      background: linear-gradient(135deg, rgba(16, 185, 129, 0.2), rgba(0, 212, 212, 0.15));
      border: 2px solid rgba(16, 185, 129, 0.4);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      animation: scaleIn 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    @keyframes scaleIn {
      from { transform: scale(0); opacity: 0; }
      to { transform: scale(1); opacity: 1; }
    }

    .success-icon svg {
      animation: checkDraw 0.5s ease 0.3s both;
    }

    @keyframes checkDraw {
      from { stroke-dashoffset: 100; }
      to { stroke-dashoffset: 0; }
    }

    h1 {
      font-family: 'Exo 2', sans-serif;
      font-size: 32px;
      font-weight: 800;
      margin-bottom: 12px;
      position: relative;
    }

    h1 .highlight {
      color: var(--teal);
    }

    .order-id {
      display: inline-block;
      background: rgba(0, 212, 212, 0.1);
      border: 1px solid rgba(0, 212, 212, 0.3);
      border-radius: 8px;
      padding: 8px 16px;
      font-size: 13px;
      color: var(--text-muted);
      margin-bottom: 24px;
    }

    .order-id strong {
      color: var(--teal);
      font-family: 'Exo 2', sans-serif;
    }

    .description {
      font-size: 15px;
      line-height: 1.6;
      color: var(--text-muted);
      margin-bottom: 32px;
    }

    .description strong {
      color: var(--text);
    }

    /* Download Section */
    .download-section {
      background: rgba(0, 212, 212, 0.05);
      border: 1px solid rgba(0, 212, 212, 0.2);
      border-radius: 12px;
      padding: 24px;
      margin-bottom: 24px;
    }

    .download-title {
      font-size: 14px;
      font-weight: 600;
      color: var(--text);
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    .download-list {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .download-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 12px 16px;
    }

    .download-info {
      display: flex;
      align-items: center;
      gap: 12px;
      text-align: left;
    }

    .download-info img {
      width: 40px;
      height: 40px;
      border-radius: 6px;
      object-fit: cover;
    }

    .download-details h3 {
      font-size: 14px;
      font-weight: 600;
      color: var(--text);
      margin-bottom: 2px;
    }

    .download-details p {
      font-size: 12px;
      color: var(--text-muted);
    }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 8px 16px;
      border: none;
      border-radius: 8px;
      font-family: 'Be Vietnam Pro', sans-serif;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      text-decoration: none;
    }

    .btn-download {
      background: var(--teal);
      color: var(--bg);
    }

    .btn-download:hover {
      background: #00EEEE;
      box-shadow: 0 0 20px rgba(0, 212, 212, 0.3);
      transform: translateY(-1px);
    }

    .btn-outline {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--text);
    }

    .btn-outline:hover {
      border-color: var(--teal);
      color: var(--teal);
    }

    /* Actions */
    .actions {
      display: flex;
      gap: 12px;
      justify-content: center;
      flex-wrap: wrap;
    }

    /* Footer */
    .footer {
      text-align: center;
      padding: 24px;
      border-top: 1px solid var(--border);
      font-size: 13px;
      color: var(--text-muted);
    }

    /* Responsive */
    @media (max-width: 640px) {
      .nav {
        padding: 12px 20px;
      }

      .nav-links {
        display: none;
      }

      .success-card {
        padding: 32px 24px;
      }

      h1 {
        font-size: 24px;
      }

      .download-item {
        flex-direction: column;
        gap: 12px;
      }

      .download-info {
        width: 100%;
      }

      .actions {
        flex-direction: column;
      }

      .btn {
        width: 100%;
        justify-content: center;
      }
    }
  </style>
  <link rel="stylesheet" href="css/responsive.css?v=2">
</head>
<body>

  <!-- Navbar -->
  <nav class="nav">
    <a href="index.html" class="nav-logo"><img src="/logo.png" alt="Logo" style="width:30px;height:30px;border-radius:50%;">SƠN NHAI</a>
    <ul class="nav-links">
      <li><a href="index.html">Trang chủ</a></li>
      <li><a href="categories.html">Danh mục</a></li>
      <li><a href="account.html">Tài khoản</a></li>
    </ul>
  </nav>

  <!-- Main Content -->
  <main class="container">
    <div class="success-card">
      <!-- Success Icon -->
      <div class="success-icon">
        <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" style="color: var(--green); stroke-dasharray: 100; stroke-dashoffset: 100;">
          <polyline points="20 6 9 17 4 12"></polyline>
        </svg>
      </div>

      <!-- Title -->
      <h1>Đặt hàng <span class="highlight">thành công!</span></h1>

      <!-- Order ID -->
      <div class="order-id" id="order-id">
        Mã đơn hàng: <strong>#ORD-2024-001</strong>
      </div>

      <!-- Description -->
      <p class="description" id="order-desc">
        Cảm ơn bạn đã mua hàng! Email xác nhận và link tải file đã được gửi đến <strong>email@example.com</strong>
      </p>

      <!-- Download Section -->
      <div class="download-section">
        <div class="download-title">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
            <polyline points="7 10 12 15 17 10"></polyline>
            <line x1="12" y1="15" x2="12" y2="3"></line>
          </svg>
          Tải xuống ngay
        </div>

        <div class="download-list">
          <!-- Rendered dynamically by JS from order data -->
        </div>
      </div>

      <!-- Actions -->
      <div class="actions">
        <a href="index.html" class="btn btn-outline">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path>
          </svg>
          Về trang chủ
        </a>
        <a href="account.html" class="btn btn-outline">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
            <circle cx="12" cy="7" r="4"></circle>
          </svg>
          Xem đơn hàng
        </a>
      </div>
    </div>
  </main>

  <!-- Footer -->
  <footer class="footer">
    © 2024 Thư viện Sơn Nhai. All rights reserved.
  </footer>

  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const orderJson = sessionStorage.getItem('sonhai_last_order');
      if (!orderJson) return;

      try {
        const order = JSON.parse(orderJson);

        // ── Header info ──
        document.getElementById('order-id').innerHTML = `Mã đơn hàng: <strong>#${order.orderNumber}</strong>`;
        document.getElementById('order-desc').innerHTML = `Cảm ơn bạn đã mua hàng! Email xác nhận và link tải file đã được gửi đến <strong>${order.customerEmail}</strong>`;

        // ── Render download items from order ──
        const items = order.items || [];
        const downloadList = document.querySelector('.download-list');
        const downloadSection = document.querySelector('.download-section');

        if (items.length === 0) {
          downloadSection.style.display = 'none';
          return;
        }

        downloadList.innerHTML = items.map((item, i) => {
          const name = item.name || 'Sản phẩm';
          const emoji = item.emoji || '📦';
          const downloadUrl = item.downloadUrl || '';

          // Build thumbnail: prefer cover image, fallback to emoji
          const thumbHtml = `<div style="width:40px;height:40px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:20px;background:rgba(0,212,212,0.08);border:1px solid var(--border);flex-shrink:0;">${emoji}</div>`;

          // Download button or pending state
          const actionHtml = downloadUrl
            ? `<a href="${downloadUrl}" target="_blank" rel="noopener noreferrer" class="btn btn-download" onclick="trackDownload('${name}')">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                  <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                  <polyline points="7 10 12 15 17 10"></polyline>
                  <line x1="12" y1="15" x2="12" y2="3"></line>
                </svg>
                Tải xuống
              </a>`
            : `<span style="font-size:12px;color:var(--text-muted);display:flex;align-items:center;gap:6px;">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="animation: spin 1.5s linear infinite;"><circle cx="12" cy="12" r="10" opacity="0.25"></circle><path d="M4 12a8 8 0 018-8" opacity="0.75"></path></svg>
                Đang chuẩn bị...
              </span>`;

          return `
            <div class="download-item">
              <div class="download-info">
                ${thumbHtml}
                <div class="download-details">
                  <h3>${name}</h3>
                  <p>PDF · Tải về ngay</p>
                </div>
              </div>
              ${actionHtml}
            </div>`;
        }).join('');

        // Update download title with count
        const hasLinks = items.some(i => i.downloadUrl);
        document.querySelector('.download-title').innerHTML = hasLinks
          ? `<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="7 10 12 15 17 10"></polyline><line x1="12" y1="15" x2="12" y2="3"></line></svg> Tải xuống ngay (${items.length} sản phẩm)`
          : `<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"></circle><polyline points="12 6 12 12 16 14"></polyline></svg> Link tải sẽ được gửi qua email`;

      } catch (e) {
        console.error('Lỗi khi đọc đơn hàng:', e);
      }
    });

    function trackDownload(productName) {
      console.log('[Download] Khách tải:', productName, 'lúc', new Date().toISOString());
    }
  </script>

  <style>
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>

<script type="module" src="/auth-ui.js"></script>
<script src="js/mobile-menu.js?v=1"></script>
</body>
</html>
